<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta de Artículos</title>
    <link rel="stylesheet" href="CSS/Style.css">
</head>
<body>

<div class="contenedor">

    <h1>Venta de Artículos</h1>

    <div class="formulario">

        <label for="producto">
            Producto
        </label>

        <select id="producto">
            <option value="">
                Seleccione un producto
            </option>
        </select>

        <label>
            Precio
        </label>

        <input
            type="text"
            id="precio"
            readonly
        >

        <label>
            Cantidad
        </label>

        <input
            type="number"
            id="cantidad"
            min="1"
            value="1"
        >

        <button onclick="vender()">
            Vender
        </button>

    </div>

</div>

<script src="JS/Ventas.js"></script>

</body>
</html>
